<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locker Rush - Accueil</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="bg-container">
        <img src="IMAGES/FootLocker Website Pics desktop.jpg" alt="Fond" class="logo-top">

        <div class="glass-card">
            <form action="jeu.html">

                <div class="form-group">
               <label for="nom">Nom :</label>
               <input type="text" id="nom" name="nom" required>
                </div>

                 <div class="form-group">
               <label for="nom">Prénom :</label>
               <input type="text" id="prénom" name="prénom" required>
                </div>
                
                <div class="form-group">
                    <label for="tel">N° téléphone :</label>
                   <input type="tel" id="tel" name="tel" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label for="magasin">Magasin :</label>
                    <select id="magasin" name="magasin" required>
                      <option value="">-- Choisir --</option>
                      <option value="paris">Paris</option>
                      <option value="Lyon">Lyon</option>
                      <option value="Marseille">Marseille</option>
                      <option value="Lille">Lille</option>
                    </select>
                </div>
                

                <div class="checkbox-group">
                    <input type="checkbox" id="cgu" required>
                    <label for="cgu">J’accepte l’utilisation de mes données par Foot Locker pour le jeu et la réception d’offres exclusives.</label>
                </div>

                <button type="submit" class="btn-submit">Valider</button>
            </form>

        </div>
    </main>

</body>
</html>
