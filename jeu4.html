<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locker Rush - Le Jeu</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="game-page">
<main class="game-wrapper">
    <img src="IMAGES/background.jpg" alt="Fond" class="logo-top">

        <div class="message-box top">
            <p>Gagner 🥳 !</p>
        </div>

        <section class="locker-section">
            <div class="locker-container">
                <button type="button" class="locker-btn" id="locker-1">
                    <img src="IMAGES/casier_ouvert.png" alt="Casier 1" class="locker-img">
                </button>

                <button type="button" class="locker-btn" id="locker-2">
                    <img src="IMAGES/casier_ouvert.png" alt="Casier 2" class="locker-img">
                </button>

                <button type="button" class="locker-btn" id="locker-3">
                    <img src="IMAGES/casier_fermer.png" alt="Casier 3" class="locker-img">
                </button>
            </div>
        </section>

        <div class="message-box bottom">
            <p>Une paire de sneakers !</p>
        </div>

    </main>

</body>
</html>
